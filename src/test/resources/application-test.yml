jwt:
  secret: dGVzdFNlY3JldEtleUZvckp3dEF1dGgxMjM0NTY3ODk=
  expiration-ms: 3600000
  refresh-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:3000

rate-limit:
  create-user:
    capacity: 100
    refill-tokens: 100
    refill-seconds: 60

spring:
  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    generate-ddl: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    com.nebula.userService: DEBUG
