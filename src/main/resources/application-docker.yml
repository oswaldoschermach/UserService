spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/userservice}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:dev@localhost}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
    debug: ${MAIL_DEBUG:false}

logging:
  level:
    com.nebula: INFO
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
