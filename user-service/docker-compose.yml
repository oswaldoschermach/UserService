services:
  postgres:
    image: postgres:16-alpine
    container_name: userservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-userservice}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - userservice_net

  redis:
    image: redis:7-alpine
    container_name: userservice_redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - userservice_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: userservice_mailhog
    restart: unless-stopped
    expose:
      - "1025"
      - "8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v2/messages >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - userservice_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userservice_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    ports:
      - "${APP_EXTERNAL_PORT:-18743}:35698"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-userservice}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dGVzdFNlY3JldEtleUZvckp3dEF1dGgxMjM0NTY3ODkwMTIzNDU2Nzg5MA==}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-dev@localhost}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4200,http://localhost:5173}
      RATE_LIMIT_CREATE_USER_CAPACITY: ${RATE_LIMIT_CREATE_USER_CAPACITY:-10}
      RATE_LIMIT_CREATE_USER_REFILL: ${RATE_LIMIT_CREATE_USER_REFILL:-10}
      RATE_LIMIT_CREATE_USER_SECONDS: ${RATE_LIMIT_CREATE_USER_SECONDS:-60}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      APP_EXTERNAL_PORT: ${APP_EXTERNAL_PORT:-18743}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:18743}
      SERVER_PORT: 35698
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:35698/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - userservice_net

volumes:
  postgres_data:
  redis_data:

networks:
  userservice_net:
    driver: bridge
